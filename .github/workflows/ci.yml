name: CI

on:
  push:
    branches-ignore: ["gh-pages"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64 (GCC)
            os: ubuntu-24.04
            cc: gcc
            cxx: g++

          - name: Linux x86_64 (Clang)
            os: ubuntu-24.04
            cc: clang
            cxx: clang++

          # ── Linux — ASan via CCALG_SANITIZE (CMake option) ────────────
          - name: Linux x86_64 (GCC ASan)
            os: ubuntu-24.04
            cc: gcc
            cxx: g++
            asan: 1
            cmake_extra: -DCCALG_SANITIZE=ON

          - name: Linux x86_64 (Clang ASan)
            os: ubuntu-24.04
            cc: clang
            cxx: clang++
            asan: 1
            cmake_extra: -DCCALG_SANITIZE=ON

          - name: Linux i386 (GCC)
            os: ubuntu-24.04
            cc: gcc
            cxx: g++
            pkgs: gcc-multilib g++-multilib
            cflags: -m32
            cxxflags: -m32

          - name: Linux i386 (Clang)
            os: ubuntu-24.04
            cc: clang
            cxx: clang++
            pkgs: gcc-multilib g++-multilib
            cflags: -m32
            cxxflags: -m32

          # ── Linux — Intel oneAPI (icx/icpx) ─────────────────────────────
          - name: Linux x86_64 (Intel icx)
            os: ubuntu-24.04
            cc: icx
            cxx: icpx
            intel: 1

          # ── Linux — C++ standard variants ──────────────────────────────
          - name: Linux x86_64 (GCC C++20)
            os: ubuntu-24.04
            cc: gcc
            cxx: g++
            cmake_extra: -DCMAKE_CXX_STANDARD=20

          - name: Linux x86_64 (Clang C++20)
            os: ubuntu-24.04
            cc: clang
            cxx: clang++
            cmake_extra: -DCMAKE_CXX_STANDARD=20

          - name: Linux x86_64 (GCC C++23)
            os: ubuntu-24.04
            cc: gcc
            cxx: g++
            cmake_extra: -DCMAKE_CXX_STANDARD=23

          - name: Linux x86_64 (Clang C++23)
            os: ubuntu-24.04
            cc: clang
            cxx: clang++
            cmake_extra: -DCMAKE_CXX_STANDARD=23

          # ── macOS — C++20 + ASan ─────────────────────────────────────
          - name: macOS arm64 (Clang C++20)
            os: macos-14
            cc: clang
            cxx: clang++
            cmake_extra: -DCMAKE_CXX_STANDARD=20

          - name: macOS arm64 (ASan)
            os: macos-14
            cc: clang
            cxx: clang++
            asan: 1
            cmake_extra: -DCCALG_SANITIZE=ON

          # ── Windows — C++20 ──────────────────────────────────────────
          - name: Windows x64 (MSVC C++20)
            os: windows-2022
            cc: cl
            cxx: cl
            cmake_extra: -DCMAKE_CXX_STANDARD=20

          # ── Linux — compiler version variety ─────────────────────────
          - name: Linux x86_64 (GCC 12)
            os: ubuntu-22.04
            cc: gcc-12
            cxx: g++-12
            pkgs: gcc-12 g++-12

          - name: Linux x86_64 (Clang 14)
            os: ubuntu-22.04
            cc: clang-14
            cxx: clang++-14
            pkgs: clang-14

          - name: Linux x86_64 (Clang 19)
            os: ubuntu-24.04
            cc: clang-19
            cxx: clang++-19
            llvm_version: 19

          - name: macOS arm64 (Apple Silicon)
            os: macos-14
            cc: clang
            cxx: clang++

          # ── Windows — MSVC ──────────────────────────────────────────────
          - name: Windows x64 (MSVC)
            os: windows-2022
            cc: cl
            cxx: cl

          - name: Windows x86 (MSVC)
            os: windows-2022
            cc: cl
            cxx: cl
            cmake_extra: -A Win32

          # ── Windows — ClangCL (VS toolset) ─────────────────────────────
          - name: Windows x64 (ClangCL)
            os: windows-2022
            cc: clang-cl
            cxx: clang-cl
            cmake_extra: -T ClangCL

          - name: Windows x86 (ClangCL)
            os: windows-2022
            cc: clang-cl
            cxx: clang-cl
            cmake_extra: -A Win32 -T ClangCL

          # ── Windows — MinGW GCC ────────────────────────────────────────
          - name: Windows x64 (MinGW GCC)
            os: windows-2022
            cc: gcc
            cxx: g++
            msystem: MINGW64
            mingw_pkg: mingw-w64-x86_64-gcc
            cmake_extra: -G Ninja

          - name: Windows x86 (MinGW GCC)
            os: windows-2022
            cc: gcc
            cxx: g++
            msystem: MINGW32
            mingw_pkg: mingw-w64-i686-gcc
            cmake_extra: -G Ninja

    steps:
      - uses: actions/checkout@v4

      - name: Install multilib (Linux 32-bit)
        if: matrix.pkgs
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.pkgs }}

      - name: Install LLVM/Clang ${{ matrix.llvm_version }}
        if: matrix.llvm_version
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | \
            sudo tee /etc/apt/trusted.gpg.d/llvm.asc >/dev/null
          sudo add-apt-repository -y "deb https://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-${{ matrix.llvm_version }} main"
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-${{ matrix.llvm_version }} lld-${{ matrix.llvm_version }}

      - name: Setup Intel oneAPI
        if: matrix.intel
        run: |
          cd /tmp
          wget -qO- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB | \
            sudo apt-key add -
          sudo add-apt-repository -y "deb https://apt.repos.intel.com/oneapi all main"
          sudo apt-get update -qq
          sudo apt-get install -y -qq intel-oneapi-compiler-dpcpp-cpp-and-cpp-classic
          # Source setvars.sh and persist icx/icpx via full path in CC/CXX
          # (setvars handles the oneAPI version directory naming)
          . /opt/intel/oneapi/setvars.sh
          echo "CC=$(which icx)" >> "$GITHUB_ENV"
          echo "CXX=$(which icpx)" >> "$GITHUB_ENV"
          echo "PATH=$PATH" >> "$GITHUB_ENV"

      - name: Setup MSYS2 (MinGW)
        if: matrix.msystem
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: ${{ matrix.mingw_pkg }}

      - name: Configure
        env:
          CFLAGS: ${{ matrix.cflags }}
          CXXFLAGS: ${{ matrix.cxxflags }}
        run: >
          cmake -S . -B build
          -DCMAKE_C_COMPILER=${{ matrix.cc }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}
          ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build

      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: ctest --test-dir build --output-on-failure -L unit

  fuzz:
    name: Fuzz (Clang + libFuzzer)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Configure (Clang + CCALG_FUZZ)
        run: >
          cmake -S . -B build-fuzz
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
          -DCCALG_FUZZ=ON
          -DCCALG_SANITIZE=OFF

      - name: Build fuzz targets
        run: cmake --build build-fuzz --target fuzz

      - name: Create seed corpus
        run: |
          mkdir -p corpus-ccunicode corpus-ccbi corpus-ccmap corpus-cchashmap
          # ASCII text for ccunicode
          echo -n 'Hello, 世界! 😀 A中B' > corpus-ccunicode/seed1
          printf '\xF0\x9F\x98\x80\xF0\x9F\x98\x81' > corpus-ccunicode/seed2
          # Decimal numbers for ccbi
          echo -n '12345678901234567890' > corpus-ccbi/seed1
          echo -n '-98765' > corpus-ccbi/seed2
          # Map keys for ccmap + cchashmap
          printf '\x01\x0A\x02\x14\x03\x1E' > corpus-ccmap/seed1
          printf '\x07\x00' > corpus-ccmap/seed2
          cp corpus-ccmap/seed1 corpus-cchashmap/seed1
          cp corpus-ccmap/seed2 corpus-cchashmap/seed2

      - name: Fuzz ccunicode (10s)
        run: |
          ./build-fuzz/fuzz/fuzz_ccunicode corpus-ccunicode -max_total_time=10 -print_pid=0 2>&1 || true

      - name: Fuzz ccbi (10s)
        run: |
          ./build-fuzz/fuzz/fuzz_ccbi corpus-ccbi -max_total_time=10 -print_pid=0 2>&1 || true

      - name: Fuzz ccmap (10s)
        run: |
          ./build-fuzz/fuzz/fuzz_ccmap corpus-ccmap -max_total_time=10 -print_pid=0 2>&1 || true

      - name: Fuzz cchashmap (10s)
        run: |
          ./build-fuzz/fuzz/fuzz_cchashmap corpus-cchashmap -max_total_time=10 -print_pid=0 2>&1 || true

  deploy-docs:
    name: Deploy docs to gh-pages
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install markdown

      - name: Generate HTML
        run: python3 scripts/md2html.py docs _gh-pages

      - name: Deploy to gh-pages
        run: |
          git checkout --orphan gh-pages-tmp
          git rm -rfq --cached . 2>/dev/null || true
          cp _gh-pages/*.html _gh-pages/sitemap.xml .
          echo "ccalg.dev" > CNAME
          git add CNAME *.html sitemap.xml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: deploy $(date +%Y-%m-%d)"
          git branch -D gh-pages 2>/dev/null || true
          git branch -m gh-pages
          git push -f origin gh-pages
